front:
  text: 太上玄一眞人說勸誡法輪妙經道言夫輪轉福慶不滅生而好學宗奉師寳與道結縁世世不絶皆由先身積行所致如此法輪上士勤尚廣開法門先人後身救度國王損口極乏裸形衣寒仁及鳥獸惠逮有生恭師奉法恒如對神長齋苦思精研洞玄吐納炁液心灰意勤割棄色累萬想都泯情和炁柔人神並歡如此之行一滅一生志不退轉尅成上仙三師備足身登太極位加仙卿中士篤好志慕在玄開度一切度厄解患施功布德建立福田君親忠考柔智懷仁願樂三寳晨夕修研虚心有道口味靈篇燒香散華洞入道門餐不念飽衣不慊寒苦不爲倦樂不爲懽勞不怠懈困而殊勤衆行並備三滅三生意志審固尅得飛行上遊太淸補九宫眞人下士修身斷情忍色服御養神逺棄榮麗棲憩幽林愛山樂水耽翫静眞淡泊守固絶榖休粮長齋念道過中不味端坐則與師寳相對出入則與鳥獸爲羣孤旅巖宂獨景空山思不慕歸悲不悼形契闊林澗切栢擬餐面有餓容心如懷丹艱苦備嬰恒有和顔見試不恐心靜神安如此之行上感虚皇九滅九生志願不退執固殊堅尅能變化乗空飛行遊宴五嶽逍遥太無從此而進位至髙仙凡學得道如此自然十方上眞衆仙巳得正道四方無極世界塵沙而來眞人從無數劫皆受太上靈寳洞玄眞一勸誡法輪妙經輪轉因縁皆籍先世之功以得今日之道莫不由其前行積善所致此法玄奥非愚情淺智所可明了唯得道之人體眞入妙乃悟生死不滅功過相藉如經之行巳得成至眞矣道言夫受滅度因縁不絶得生人道聲色端偉相好具足才智明逹解了玄義或生貴門王侯之家或爲人尊四海所崇男爲國主女爲妃后世生貴子代代不休或生於富室財寳充足凡百施爲無所饑乏如此之德皆由其前身行業積善願念所致或處在窮厄不泰之地艱辛憂惱愁苦難忍乃發願慈心思念作善竭力建功施種福田割已救物損身度人忍饑守廉不敢怨天心不念殺口無惡言敬愛道士唯善而行功滿德備一滅一生其福無量得如今之報若能又於今生抗志易韻棄禄學道宗師受經長齋念眞不妬不害緘口愼言愛師重寳存詠不忘當藉先世之基二滅二生便得神仙三官九府記人功過毫末必戴萬無差失其願旣定志亦難奪故倚伏難窮所謂法輪之門道言諸道士及百姓子男女人或生而好道奉師受經於家修奉施安髙座朝夕朝禮齋直燒香無有懈怠受好三寳恒如饑渴廢家翫樂不務生業不𡜍不害不滛不殺守情忍色所營在法如此之行皆由其前身供養道士勸助師宗奉香然燈建立福田損身施惠救厄䘏貧功滿德普一滅一生得如今之業從此不退便坐致神仙縱道業未備運應更輪尅得尸解㑹成眞人也道言吾歷觀諸天從無數劫來見諸道士百姓子男女人巳得無上正眞之道髙仙眞人自然十方諸聖皆受前生勤苦求道不可稱計投身棄命無有限量廣建功徳發大乗之心長齋苦行市諸香油然十燈百燈千燈無量之數光映十方照耀諸天晻㝠普消金寳珍貨以散道路供給窮乏損身割已奉師效心無悋惜心念前生不得如今當盡心開度衆生預是鳥獸莫不歸仁於是惠澤流溢功感諸天身得金剛七十二相項負圎明洞映太空位登髙仙此福巍巍難可稱述如此之比有無鞅之數皆積行所得非唯一生學而成也來生爲學八吾法門當瞻之先世以期神仙功滿徳普尅入自然至眞之塲也今說法輪偈頌三篇
