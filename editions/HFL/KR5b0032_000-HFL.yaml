body:
  text: 無上八門開度法輪偈頌曰吾開八門中有玉城七寳瓊林無根而生金條穿互䕃映上清開度法輪通眞達靈上無不照下無不明見有道士晨夕誦經長齋幽阜不倦晝㝠切栢中餐素水兼𤃩躬師受法時刻不傾單景巖宂獨宿孤征與鹿爲羣倚林棲形窮獸對蹲飛鳥哀鳴風雲凄切萬枯沉零凝冰塡澗素雪翳庭寒癘切肌執志殊精契闊林岫艱苦備嬰勞不敢倦極不敢寧展轉求道遂感皇情丹書緑字列圖玄名神仙羽服錦帬飛青鬱然而降焕落火鈴流霞丹輿三素飛軿八我八門乃知死生皆由積行苦哉有情此一偈出太上玄臺髙上老子歷觀八極謂之八門而誦此篇也轉輪滅度行業偈頌曰法輪開滅度死生從願廻積基有明報禍福更相催世眼求前生達士希後歸前生功未滿故致福報遲藉先勸來行功備形自飛前世十方仙歷劫乃入微吾觀至學士乃不領人懷勤行奉師寳師祐福巍巍輕師失吾寳先功永無施勸誡成爾眞三師度玄扉若能體道眞法輪洞自開莫見此寂寂幽㝠中甚微此一篇出虚皇無上道君開無無中而觀來生歷頌此篇以勸誡八無也轉輪命根未盡偈頌曰轉輪空洞魂滅度更死生罪福各有對吉凶無偏嬰得道行所致緣爾先身精行惡招斯酷流曵五苦庭天地雖悠悠玄鑒理甚明吾歷觀汝輩從師受吾經得經叛汝師𡜍嫉爭功名轗軻不自咎縁路吐怨聲致使六部司執筆紏爾刑命滅負乃山苦惱身是嬰徃反三塗中豈覺形與名化爲六畜羣望反其冥冥法輪有常運去留無稽停哀此禍福元受報不賈生念汝不知命發頌傷我情此一篇出虚無正眞皇上丈人歷觀來生行業行罪有負逆之對勸誡入眞行大慈之心頌此篇令知宿命之根也太上玄一眞人曰吾昔受無極太上大道君無上八門開度法輪勸誡經頌修行道成位加眞人此文與元始同生包含天地億劫長存廣度一切爲諸津梁輪轉勸誡以教導三乗廣覆無外開死度生其福無量諸天所宗學者所慿也其文妙重皆授宿有玄名帝圖錄字三清應爲仙公之人自非其質不得妄宣見其篇句皆由宿福積行所鍾能盡心供養依法修行宿根自滅與善結縁世享福慶家門興隆身受開度永得入無爲之塲尅成眞人也輕傳漏慢考滅爾身太上玄一眞人說勸誡法輪妙經終
