front:
  text: 太上玄一真人說勸誡法輪妙經道言夫輪轉福慶不滅生而好學宗奉師寶與道結緣世世不絶皆由先身積行所致如此法輪上士勤尚廣開法門先人後身救度國王損口極乏裸形衣寒仁及鳥獸惠逮有生恭師奉法恆如對神長齊苦思精研洞玄吐納氣液心灰意勤割棄色纍萬想都泯情和氣柔人神並歡如此之行一滅一生志不退轉尅成上仙三師備足身登太極位加仙卿中士篤好志慕在玄開度一切度厄解患施功布德建立福田君親忠考柔智懷仁願樂三寶晨夕修研虛心有道口味靈篇燒香散華洞入道門餐不念飽衣不慊寒苦不為倦樂不為歡勞不怠懈困而殊勤衆行並備三滅三生意志審固尅得飛行上遊太淸補九宫真人下士修身斷情忍色服御養神逺棄榮麗棲憩幽林愛山樂水耽玩靜真淡泊守固絶榖休糧長齊念道過中不味端坐則與師寶相對出入則與鳥獸為羣孤旅巖冗獨景空山思不慕歸悲不悼形契闊林澗切柏擬餐面有餓容心如懷丹艱苦備嬰恆有和顔見試不恐心靜神安如此之行上感虛皇九滅九生志願不退執固殊堅尅能變化乘空飛行遊宴五嶽逍遙太無從此而進位至髙仙凡學得道如此自然十方上真衆仙巳得正道四方無極世界塵沙而來真人從無數劫皆受太上靈寶洞玄真一勸誡法輪妙經輪轉因緣皆籍先世之功以得今日之道莫不由其前行積善所致此法玄奧非愚情淺智所可明了唯得道之人體真入妙乃悟生死不滅功過相藉如經之行巳得成至真矣道言夫受滅度因緣不絶得生人道聲色端偉相好具足才智明逹解了玄義或生貴門王侯之家或為人尊四海所崇男為國主女為妃后世生貴子代代不休或生於富室財寶充足凡百施為無所饑乏如此之德皆由其前身行業積善願念所致或處在窮厄不泰之地艱辛憂惱愁苦難忍乃發願慈心思念作善竭力建功施種福田割已救物損身度人忍饑守廉不敢怨天心不念殺口無惡言敬愛道士唯善而行功滿德備一滅一生其福無量得如今之報若能又於今生抗志易韻棄祿學道宗師受經長齊念真不妬不害緘口愼言愛師重寶存詠不忘當藉先世之基二滅二生便得神仙三官九府記人功過毫末必戴萬無差失其願既定志亦難奪故倚伏難窮所謂法輪之門道言諸道士及百姓子男女人或生而好道奉師受經於家修奉施安髙座朝夕朝禮齊直燒香無有懈怠受好三寶恆如饑渴廢家玩樂不務生業不𡜍不害不淫不殺守情忍色所營在法如此之行皆由其前身供養道士勸助師宗奉香然燈建立福田損身施惠救厄恤貧功滿德普一滅一生得如今之業從此不退便坐致神仙縱道業未備運應更輪尅得尸解㑹成真人也道言吾歷觀諸天從無數劫來見諸道士百姓子男女人巳得無上正真之道髙仙真人自然十方諸聖皆受前生勤苦求道不可稱計投身棄命無有限量廣建功德發大乘之心長齊苦行市諸香油然十燈百燈千燈無量之數光映十方照耀諸天暗冥普消金寶珍貨以散道路供給窮乏損身割已奉師效心無吝惜心念前生不得如今當盡心開度衆生預是鳥獸莫不歸仁於是惠澤流溢功感諸天身得金剛七十二相項負圎明洞映太空位登髙仙此福巍巍難可稱述如此之比有無鞅之數皆積行所得非唯一生學而成也來生為學八吾法門當瞻之先世以期神仙功滿德普尅入自然至真之場也今說法輪偈頌三篇
